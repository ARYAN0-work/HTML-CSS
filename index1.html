<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON CLONE</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="upper_nav">
           <a id="Amazon_logo" href="#">
               <img src="https://pngimg.com/uploads/amazon/amazon_PNG11.png" alt="Amazon logo">
           </a> 
           <div class="nav_address">
            <p class="add_first">Deliver to</p>

            <div class="add_icon">
                  <img src="https://img.icons8.com/ios-filled/50/ffffff/marker.png">
                  <p class="add_second">India</p>
            </div>
           </div>
           <div class="nav_search">
            <select id="Options">
              <option value="all">All</option>
              <option value="electronics">Electronics</option>
              <option value="books">Books</option>
              <option value="fashion">Fashion</option>
              <option value="home">Home & Kitchen</option>
              <option value="toys">Toys</option>
            </select> 
            <input type="text" placeholder="Search Amazon">

           <div class="search_icon">
            <i class="fa-solid fa-magnifying-glass"></i>
           </div>
          </div>
            
            <div class="nav_right">

           <div class="nav_signin border">
             <p><span>Hello, sign in</span></p>
             <p class="nav_second">Account & Lists</p>
           </div>
         
           <div class="nav_return border">
             <p><span>Returns</span></p>
             <p class="nav_second">& Orders</p>
           </div>
         
           <div class="nav_cart border">
             <i class="fa-solid fa-cart-shopping"></i>
             <span>Cart</span>
           </div>
         
           </div>
          
        </nav> 
        
        <nav id="lower_nav"></nav>
    </header>
</body>
</html>
